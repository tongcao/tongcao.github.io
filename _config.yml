title: 我的日记博客
description: 记录生活与技术思考
baseurl: "" # 留空，因为是根域名
url: "https://tongcao.github.io" # 你的网站地址
theme: minima # 使用官方默认简洁主题
author:
  name: tongcao
  email: your-email@example.com

# 博客配置
permalink: /:year/:month/:day/:title/ # 文章 URL 格式
paginate: 5 # 每页显示 5 篇文章

# 导航栏链接
header_pages:
  - about.md
  - archive.md

# 页脚社交链接
social_links:
  github: tongcao
  twitter: your_twitter_id
  email: your-email@example.com
# 自动支持深色模式，日期也会更整洁。
minima:
  skin: auto  # 自动跟随系统深色/浅色模式
  date_format: "%Y-%m-%d"  # 日期显示格式
  custom_css: /assets/css/style.css # css样式
